{{define "title"}}{{.Post.Title}} — {{.Site.Title}}{{end}}

{{define "content"}}
<article class="post">
    <header class="post-header">
        <h1>{{.Post.Title}}</h1>
        {{template "post-meta" .Post}}
    </header>
    <div class="post-content">
        {{.Content}}
    </div>
</article>
{{end}}
