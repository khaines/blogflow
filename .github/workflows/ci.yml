name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Validate Azure collector image pinning
        run: python3 deploy/azure/validate-collector-image-pin.py

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: golangci-lint
        run: golangci-lint run ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build
        run: go build ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Unit Tests
        run: go test -v -count=1 -race -shuffle=on ./...

      - name: Coverage
        run: |
          go test -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Helm lint
        run: helm lint deploy/helm/blogflow/

      - name: Helm template render
        run: helm template blogflow deploy/helm/blogflow/ > /dev/null

  k8s-lint:
    name: K8s Manifest Lint
    runs-on: ubuntu-latest
    env:
      KUBECONFORM_VERSION: v0.7.0
    steps:
      - uses: actions/checkout@v7

      - name: Install kubeconform
        run: |
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" | tar xz
          sudo mv kubeconform /usr/local/bin/
          kubeconform -v

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Validate K8s manifests
        run: kubeconform -strict -summary -ignore-filename-pattern 'kustomization.yaml' examples/k8s/

      - name: Validate Helm template output
        run: |
          helm template blogflow deploy/helm/blogflow/ \
            | kubeconform -strict -summary
          helm template blogflow deploy/helm/blogflow/ \
            --set sync.strategy=webhook \
            --set sync.webhook.secret=ci-placeholder \
            | kubeconform -strict -summary
          helm template blogflow deploy/helm/blogflow/ \
            --set sync.strategy=sidecar \
            --set sync.sidecar.repo=https://github.com/example/content.git \
            | kubeconform -strict -summary
          helm template blogflow deploy/helm/blogflow/ \
            --set ingress.enabled=true \
            --set pdb.enabled=true \
            | kubeconform -strict -summary

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test, helm-lint, k8s-lint]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: blogflow:ci-${{ github.sha }}

      - name: Check image size
        run: |
          SIZE=$(docker image inspect blogflow:ci-${{ github.sha }} --format='{{.Size}}')
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Image size: ${SIZE_MB}MB"
          if [ "$SIZE_MB" -gt 50 ]; then
            echo "::error::Image size ${SIZE_MB}MB exceeds 50MB limit"
            exit 1
          elif [ "$SIZE_MB" -gt 20 ]; then
            echo "::warning::Image size ${SIZE_MB}MB exceeds 20MB target"
          fi
          echo "✅ Image size OK: ${SIZE_MB}MB"

      - name: Smoke test container
        run: |
          set -euo pipefail

          IMAGE="blogflow:ci-${{ github.sha }}"
          CONTAINER="blogflow-smoke-$$"
          PASS=0
          FAIL=0

          cleanup() { docker rm -f "$CONTAINER" >/dev/null 2>&1 || true; }
          trap cleanup EXIT

          docker run -d --name "$CONTAINER" -p 0:8080 "$IMAGE"
          PORT=$(docker port "$CONTAINER" 8080 | head -1 | cut -d: -f2)
          BASE="http://localhost:${PORT}"

          # Wait for healthy (poll /healthz, max 10s)
          echo "⏳ Waiting for container to be healthy..."
          for i in $(seq 1 20); do
            if curl -sf --max-time 2 "$BASE/healthz" >/dev/null 2>&1; then
              echo "✅ Container healthy after $((i / 2))s"
              break
            fi
            if [ "$i" -eq 20 ]; then
              echo "::error::Container failed to become healthy within 10s"
              docker logs "$CONTAINER"
              exit 1
            fi
            sleep 0.5
          done

          check() {
            local url="$1" expected_status="$2" body_match="$3" label="$4"
            local response status body
            response=$(curl -s -w '\n%{http_code}' --max-time 5 --connect-timeout 3 "$url")
            status=$(echo "$response" | tail -1)
            body=$(echo "$response" | sed '$d')

            if [ "$status" != "$expected_status" ]; then
              echo "::error::$label — expected $expected_status, got $status"
              FAIL=$((FAIL + 1))
              return
            fi

            if [ -n "$body_match" ] && ! echo "$body" | grep -qi "$body_match"; then
              echo "::error::$label — response body missing '$body_match'"
              FAIL=$((FAIL + 1))
              return
            fi

            echo "✅ $label"
            PASS=$((PASS + 1))
          }

          echo ""
          echo "🧪 Running smoke tests..."
          check "$BASE/healthz"     200 "ok"       "GET /healthz → 200"
          check "$BASE/readyz"      200 "ready"    "GET /readyz → 200"
          check "$BASE/"            200 "BlogFlow" "GET / → 200 (home page)"
          check "$BASE/feed.xml"    200 "xml"      "GET /feed.xml → 200 (feed)"
          check "$BASE/metrics"     200 "go_"      "GET /metrics → 200 (prometheus)"
          check "$BASE/nonexistent" 404 ""         "GET /nonexistent → 404"

          echo ""
          echo "Results: $PASS passed, $FAIL failed"
          if [ "$FAIL" -gt 0 ]; then
            docker logs "$CONTAINER"
            exit 1
          fi

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - uses: actions/checkout@v7

      - name: Run E2E tests
        run: make e2e
