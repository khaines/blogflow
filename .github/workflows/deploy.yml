name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: [Publish]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Compute image tag
        id: image
        run: echo "tag=sha-$(echo $GITHUB_SHA | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Deploy Bicep template
        run: |
          az deployment group create \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --template-file deploy/azure/main.bicep \
            --parameters \
              location="eastus2" \
              scaleMinReplicas=1 \
              scaleMaxReplicas=2 \
              environmentName="${{ secrets.AZURE_ENVIRONMENT_NAME }}" \
              ghcrUsername="${{ github.repository_owner }}" \
              ghcrPassword="${{ secrets.GHCR_PASSWORD }}" \
              appInsightsConnectionString="${{ secrets.APPINSIGHTS_CONNECTION_STRING }}" \
              containerImage="ghcr.io/${{ github.repository }}:${{ steps.image.outputs.tag }}"
