# Content Deploy — Trigger BlogFlow webhook on content push
# Copy this workflow to your content repository's .github/workflows/
name: Deploy Content

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    name: Trigger BlogFlow Webhook
    runs-on: ubuntu-latest
    steps:
      - name: Determine target environment
        id: env
        run: |
          echo "url=${{ secrets.BLOGFLOW_WEBHOOK_URL }}" >> $GITHUB_OUTPUT

      - name: Trigger webhook
        run: |
          # Build the webhook payload
          PAYLOAD='{"ref":"refs/heads/${{ github.ref_name }}","repository":{"full_name":"${{ github.repository }}"},"head_commit":{"id":"${{ github.sha }}","message":"${{ github.event.head_commit.message }}"}}'

          # Compute HMAC-SHA256 signature
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.BLOGFLOW_WEBHOOK_SECRET }}" | sed 's/.*= //')

          # Send webhook
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            -H "X-GitHub-Event: push" \
            -H "X-GitHub-Delivery: ${{ github.run_id }}" \
            -d "$PAYLOAD" \
            "${{ steps.env.outputs.url }}")

          echo "Webhook response: $HTTP_CODE"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Webhook failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "✅ Content deploy triggered successfully"

      - name: Verify content updated
        if: always()
        run: |
          echo "📝 Content pushed: ${{ github.event.head_commit.message }}"
          echo "🔗 Commit: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
