# Release notes configuration for GitHub auto-generated release notes
# See: https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - "status:needs-triage"
    authors:
      - "dependabot"
  categories:
    - title: "⚠️ Breaking Changes"
      labels:
        - "breaking-change"
    - title: "🔒 Security"
      labels:
        - "security"
    - title: "🆕 New Features"
      labels:
        - "type:feature"
    - title: "🐛 Bug Fixes"
      labels:
        - "type:bug"
    - title: "🏗️ Infrastructure & Tooling"
      labels:
        - "type:infra"
    - title: "🔧 Maintenance"
      labels:
        - "type:tech-debt"
    - title: "📖 Documentation"
      labels:
        - "type:docs"
    - title: "🧪 Experiments & Spikes"
      labels:
        - "type:experiment"
        - "type:spike"
    - title: "📋 Architecture Decisions"
      labels:
        - "type:adr"
    - title: "📦 Other Changes"
      labels:
        - "*"
