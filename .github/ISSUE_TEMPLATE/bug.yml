name: Bug Report
description: Report a bug or unexpected behavior in BlogFlow
title: "[Bug] "
labels: ["type:bug", "status:needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report
        Help us fix issues by providing as much detail as possible.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Start blogflow with '...'
        2. Navigate to '...'
        3. Observe '...'
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Development
        - Staging
        - Production
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical — Service down or data loss
        - High — Major feature broken, no workaround
        - Medium — Feature impaired, workaround exists
        - Low — Minor issue, cosmetic or edge case
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component Affected
      description: Which BlogFlow component is impacted?
      options:
        - HTTP Server & Routing
        - Content Pipeline (scanning, parsing, rendering)
        - Theme Engine (templates, overlay FS)
        - Markdown Rendering
        - Configuration System
        - Git Sync (webhook, sidecar, file watcher)
        - Git Authentication (SSH, PAT, GitHub App)
        - RSS / Atom Feed
        - Sitemap Generation
        - Embedded Default Theme
        - Container / Docker
        - CI/CD Pipelines
        - CLI Interface
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: screenshots-logs
    attributes:
      label: Screenshots / Logs
      description: Attach any relevant screenshots, error messages, or log output.
