name: Feature Request
description: Propose a new capability or enhancement
title: "[Feature] "
labels: ["type:feature", "status:needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request
        Describe the feature you'd like to see in BlogFlow.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What should this feature do?
    validations:
      required: true
  - type: textarea
    id: user-story
    attributes:
      label: User Story
      description: "As a [role], I want [capability] so that [benefit]."
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: What conditions must be met for this to be considered done?
  - type: dropdown
    id: workstream
    attributes:
      label: Workstream
      options:
        - Engine — Core server, content pipeline, rendering
        - Themes — Templates, CSS, theme system, default theme
        - GitOps — Sync strategies, webhook, git-sync, authentication
        - DevEx — CLI, quick start, documentation, developer tools
        - Infrastructure — Container, CI/CD, deployment, security
        - Cross-cutting
  - type: dropdown
    id: phase
    attributes:
      label: Target Phase
      options:
        - P1 — Scaffolding & DevEx
        - P2 — Foundation
        - P3 — Content Pipeline
        - P4 — Server & Theme
        - P5 — Git Operations
        - P6 — Container & Security
        - P7 — Content & Theme Repos
        - Unassigned
  - type: dropdown
    id: size
    attributes:
      label: Size Estimate
      options:
        - S (< 1 day)
        - M (1–3 days)
        - L (3–5 days)
        - XL (> 5 days)
        - Unknown
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any screenshots, diagrams, references, or related issues.
