# Kustomize entrypoint for the webhook deployment pattern.
# Usage: kubectl apply -k examples/k8s/webhook/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: blogflow

resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - secret.yaml
  - configmap.yaml

commonLabels:
  app.kubernetes.io/part-of: blogflow
